<!-- CONTACT -->
<section class="sec contact-bg" id="contact">
  <div class="wrap">
    <div class="contact-wrap">
      <div>
        <div class="mono-tag rv">Contact</div>
        <h2 class="big-h rv" style="margin-bottom:16px">Tell us what<br/>you <em>need.</em></h2>
        <p class="rv" style="font-size:15px;color:var(--ink2);line-height:1.85;margin-bottom:32px">Fill in the form. Response within 24 hours. No pitch on the first reply, just a straight conversation about what you're trying to do.</p>
        <div class="c-items">
          <div class="c-item rv d1">
            <div class="c-item-ico">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <div>
              <strong>Email</strong>
              <a href="mailto:{{ site.author.email }}">{{ site.author.email }}</a>
            </div>
          </div>
          <div class="c-item rv d2">
            <div class="c-item-ico">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <div><strong>Response Time</strong><span>Within 24 hours</span></div>
          </div>
          <div class="c-item rv d3">
            <div class="c-item-ico">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
            </div>
            <div><strong>Location</strong><span>Remote, worldwide</span></div>
          </div>
          <div class="c-item rv d4">
            <div class="c-item-ico">
              <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            </div>
            <div><strong>LinkedIn</strong><a href="{{ site.social.linkedin }}" target="_blank" rel="noopener">ARYX K.</a></div>
          </div>
        </div>
      </div>

      <form class="cf rv" id="cf" action="mailto:{{ site.author.email }}" method="get">
        <div class="frow">
          <div class="fg">
            <label>Name *</label>
            <input type="text" name="name" placeholder="Your name" required/>
          </div>
          <div class="fg">
            <label>Email *</label>
            <input type="email" name="email" placeholder="you@example.com" required/>
          </div>
        </div>
        <div class="fg">
          <label>Service *</label>
          <select name="service" required>
            <option value="" disabled selected>What do you need?</option>
            <option>Web Design &amp; Development</option>
            <option>SEO &amp; Organic Growth</option>
            <option>Content Writing</option>
            <option>Digital Marketing</option>
            <option>Affiliate &amp; Monetization</option>
            <option>AI &amp; Automation</option>
            <option>Full Package</option>
          </select>
        </div>
        <div class="fg">
          <label>Budget</label>
          <select name="budget">
            <option value="" disabled selected>Approximate range</option>
            <option>Under $100</option>
            <option>$100 to $300</option>
            <option>$300 to $700</option>
            <option>$700 to $1,500</option>
            <option>$1,500 and above</option>
          </select>
        </div>
        <div class="fg">
          <label>Project Details *</label>
          <textarea name="message" placeholder="What are you building, what's the goal, and is there a deadline?" required></textarea>
        </div>
        <div class="cf-sub">
          <button type="submit" class="btn-main btn-filled">
            Send Message
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
        <div id="fdone">Sent. Reply within 24 hours.</div>
      </form>
    </div>
  </div>
</section>
